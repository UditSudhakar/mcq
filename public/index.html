<!DOCTYPE html>
<html>
<head>
<title>MCQ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>Login</h2>
<form id="loginForm">
<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>
<button>Login</button>
</form>

<hr>

<h2>Register</h2>
<form id="registerForm">
<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="text" name="rollno" placeholder="Roll No" required>
<input type="password" name="password" placeholder="Password" required>
<button>Register</button>
</form>

</div>

<script>

/* LOGIN */
document.getElementById("loginForm").addEventListener("submit", async e=>{
e.preventDefault();
let data = new FormData(e.target);

let res = await fetch("/login",{method:"POST",body:new URLSearchParams(data)});
let r = await res.json();

alert(r.message);
if(r.message.includes("Success")) location="exam.html";
});

/* REGISTER */
document.getElementById("registerForm").addEventListener("submit", async e=>{
e.preventDefault();
let data = new FormData(e.target);

let res = await fetch("/register",{method:"POST",body:new URLSearchParams(data)});
let r = await res.json();

alert(r.message);
});

</script>

</body>
</html>
