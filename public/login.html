<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container" style="text-align:center; max-width:600px;">

<h1 style="font-size:36px;">🚀 Online Examination</h1>

<p style="margin-bottom:25px; font-weight:600;">
✨ Developed by 𝐔𝐝𝐢𝐭 𝐒𝐮𝐝𝐡𝐚𝐤𝐚𝐫
</p>

<h2>🔐 Login</h2>

<form id="loginForm" style="margin-top:20px;">

<input type="email" name="email" placeholder="📧 User/Admin ID" required
style="width:80%; padding:12px; margin:10px; border-radius:25px; border:none; text-align:center;">

<input type="password" name="password" placeholder="🔑 Password" required
style="width:80%; padding:12px; margin:10px; border-radius:25px; border:none; text-align:center;">

<br>

<button type="submit" style="
background:linear-gradient(90deg,#00f2fe,#4facfe);
color:white;
padding:12px 30px;
border-radius:25px;
margin-top:10px;">
🚀 Login
</button>

</form>

<p style="margin-top:20px;">
👤 New user? <a href="register.html">Sign up</a>
</p>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
e.preventDefault();

let formData = new FormData(this);

let res = await fetch("/login",{
method:"POST",
body:new URLSearchParams(formData)
});

let data = await res.json();

alert(data.message);

if(data.role === "admin"){
window.location = "admin.html";
}
else if(data.role === "user"){
localStorage.setItem("studentName", data.name);
localStorage.setItem("rollno", data.rollno);
window.location = "exam.html";
}
});
</script>

</body>
</html>
