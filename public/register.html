<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container" style="text-align:center; max-width:650px;">

<h1 style="font-size:36px;">🚀 Online Examination</h1>

<p style="margin-bottom:25px; font-weight:600;">
✨ Developed by 𝐔𝐝𝐢𝐭 𝐒𝐮𝐝𝐡𝐚𝐤𝐚𝐫
</p>

<h2>📝 Register</h2>

<form id="registerForm" style="margin-top:20px;">

<input type="text" name="name" placeholder="👤 Full Name" required
style="width:80%; padding:12px; margin:8px; border-radius:25px; border:none; text-align:center;">

<input type="email" name="email" placeholder="📧 Email ID" required
style="width:80%; padding:12px; margin:8px; border-radius:25px; border:none; text-align:center;">

<input type="text" name="rollno" placeholder="🎓 Roll No" required
style="width:80%; padding:12px; margin:8px; border-radius:25px; border:none; text-align:center;">

<input type="password" name="password" placeholder="🔑 Create Password" required
style="width:80%; padding:12px; margin:8px; border-radius:25px; border:none; text-align:center;">

<br>

<button type="submit" style="
background:linear-gradient(90deg,#ff7e5f,#feb47b);
color:white;
padding:12px 30px;
border-radius:25px;
margin-top:10px;">
✅ Register
</button>

</form>

<p style="margin-top:20px;">
🔐 Already have account? <a href="login.html">Login</a>
</p>

</div>

<script>
document.getElementById("registerForm").addEventListener("submit", async function(e){
e.preventDefault();

let formData = new FormData(this);

let res = await fetch("/register",{
method:"POST",
body:new URLSearchParams(formData)
});

let data = await res.json();
alert(data.message);

if(data.message === "Registered Successfully"){
window.location = "login.html";
}
});
</script>

</body>
</html>
